<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #fff;
  }
  h1 { font-size: 28px; color: #f0c040; margin-bottom: 10px; letter-spacing: 4px; }
  #info {
    display: flex;
    gap: 40px;
    margin-bottom: 10px;
    font-size: 16px;
  }
  #info span { color: #f0c040; }
  canvas {
    border: 3px solid #f0c040;
    background: #2a2a2a;
    display: block;
  }
  #hint {
    margin-top: 10px;
    font-size: 13px;
    color: #888;
  }
  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    pointer-events: none;
  }
  #overlay h2 { font-size: 36px; color: #f0c040; text-shadow: 0 0 12px #f0a020; }
  #overlay p  { font-size: 20px; color: #ccc; }
  button {
    padding: 10px 30px;
    font-size: 18px;
    background: #f0c040;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-weight: bold;
    pointer-events: all;
  }
  button:hover { background: #ffd060; }
</style>
</head>
<body>
<h1>坦克大战</h1>
<div id="info">
  <div>生命: <span id="lives">3</span></div>
  <div>得分: <span id="score">0</span></div>
  <div>关卡: <span id="level">1</span></div>
</div>
<div style="position:relative">
  <canvas id="c" width="600" height="600"></canvas>
  <div id="overlay">
    <h2 id="ol-title">坦克大战</h2>
    <p id="ol-msg">方向键/WASD 移动 &nbsp; 空格/J 射击</p>
    <button id="ol-btn" onclick="startGame()">开始游戏</button>
  </div>
</div>
<div id="hint">方向键/WASD 移动 &nbsp;|&nbsp; 空格/J 射击</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const TILE = 40, COLS = W / TILE, ROWS = H / TILE;

// ── State ──────────────────────────────────────────────────────────────────
let player, enemies, bullets, walls, state, score, lives, level;
let keys = {};
let lastTime = 0, enemySpawnTimer = 0;

// ── Init ───────────────────────────────────────────────────────────────────
function startGame() {
  score = 0; lives = 3; level = 1;
  document.getElementById('overlay').style.display = 'none';
  initLevel();
  state = 'play';
  requestAnimationFrame(loop);
}

function initLevel() {
  walls   = buildWalls();
  enemies = [];
  bullets = [];
  player  = makeTank(W / 2, H - 80, '#4caf50', 'player');
  enemySpawnTimer = 0;
  updateHUD();
}

// ── Tanks ──────────────────────────────────────────────────────────────────
function makeTank(x, y, color, type) {
  return {
    x, y, color, type,
    dir: type === 'player' ? 0 : 180, // degrees: 0=up
    speed: type === 'player' ? 2.5 : 1.2 + level * 0.15,
    w: 28, h: 28,
    cooldown: 0,
    hp: type === 'player' ? 1 : 1,
    aiTimer: 0, aiDir: Math.random() < 0.5 ? 90 : 270,
  };
}

// ── Walls ──────────────────────────────────────────────────────────────────
function buildWalls() {
  const ws = [];
  // Border
  for (let c = 0; c < COLS; c++) {
    ws.push(makeWall(c * TILE, 0));
    ws.push(makeWall(c * TILE, (ROWS - 1) * TILE));
  }
  for (let r = 1; r < ROWS - 1; r++) {
    ws.push(makeWall(0, r * TILE));
    ws.push(makeWall((COLS - 1) * TILE, r * TILE));
  }
  // Inner maze — fixed pattern
  const pattern = [
    [2,2],[3,2],[4,2],[7,2],[8,2],[9,2],[11,2],[12,2],
    [2,4],[6,4],[7,4],[8,4],[12,4],
    [2,6],[3,6],[5,6],[9,6],[11,6],[12,6],
    [4,8],[5,8],[9,8],[10,8],
    [2,10],[6,10],[7,10],[8,10],[12,10],
    [2,12],[3,12],[4,12],[10,12],[11,12],[12,12],
  ];
  for (const [c, r] of pattern) ws.push(makeWall(c * TILE, r * TILE));
  return ws;
}

function makeWall(x, y) {
  return { x, y, w: TILE, h: TILE, hp: 1 };
}

// ── Bullets ───────────────────────────────────────────────────────────────
function shoot(tank) {
  if (tank.cooldown > 0) return;
  const rad = (tank.dir - 90) * Math.PI / 180;
  const speed = 5;
  bullets.push({
    x: tank.x, y: tank.y,
    vx: Math.cos(rad) * speed, vy: Math.sin(rad) * speed,
    owner: tank.type, w: 6, h: 6,
  });
  tank.cooldown = tank.type === 'player' ? 25 : 60;
}

// ── Collision ─────────────────────────────────────────────────────────────
function rectsOverlap(a, b) {
  return a.x - a.w / 2 < b.x + b.w / 2 &&
         a.x + a.w / 2 > b.x - b.w / 2 &&
         a.y - a.h / 2 < b.y + b.h / 2 &&
         a.y + a.h / 2 > b.y - b.h / 2;
}

function wallCollide(entity) {
  for (const w of walls) {
    if (rectsOverlap(entity, { x: w.x + w.w / 2, y: w.y + w.h / 2, w: w.w, h: w.h })) return w;
  }
  return null;
}

// ── AI ────────────────────────────────────────────────────────────────────
function updateEnemy(e, dt) {
  e.aiTimer -= dt;
  if (e.aiTimer <= 0) {
    // Randomly choose direction towards player or random
    const dx = player.x - e.x, dy = player.y - e.y;
    const chase = Math.random() < 0.5;
    if (chase) {
      e.dir = Math.abs(dx) > Math.abs(dy)
        ? (dx > 0 ? 90 : 270)
        : (dy > 0 ? 180 : 0);
    } else {
      e.dir = [0, 90, 180, 270][Math.floor(Math.random() * 4)];
    }
    e.aiTimer = 60 + Math.random() * 90;
  }

  const rad = (e.dir - 90) * Math.PI / 180;
  const nx = e.x + Math.cos(rad) * e.speed;
  const ny = e.y + Math.sin(rad) * e.speed;
  const prev = { x: e.x, y: e.y };
  e.x = nx; e.y = ny;
  if (wallCollide(e) || e.x < e.w / 2 || e.x > W - e.w / 2 || e.y < e.h / 2 || e.y > H - e.h / 2) {
    e.x = prev.x; e.y = prev.y;
    e.aiTimer = 0; // recalculate direction
  }

  e.cooldown = Math.max(0, e.cooldown - 1);
  if (Math.random() < 0.008) shoot(e);
}

// ── Main Loop ─────────────────────────────────────────────────────────────
function loop(ts) {
  if (state !== 'play') return;
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  update(dt);
  render();
  requestAnimationFrame(loop);
}

function update(dt) {
  // Player input
  if (player) {
    const UP    = keys['ArrowUp']    || keys['w'] || keys['W'];
    const DOWN  = keys['ArrowDown']  || keys['s'] || keys['S'];
    const LEFT  = keys['ArrowLeft']  || keys['a'] || keys['A'];
    const RIGHT = keys['ArrowRight'] || keys['d'] || keys['D'];
    const FIRE  = keys[' '] || keys['j'] || keys['J'];

    if (UP)    player.dir = 0;
    if (DOWN)  player.dir = 180;
    if (LEFT)  player.dir = 270;
    if (RIGHT) player.dir = 90;

    if (UP || DOWN || LEFT || RIGHT) {
      const rad = (player.dir - 90) * Math.PI / 180;
      const nx = player.x + Math.cos(rad) * player.speed;
      const ny = player.y + Math.sin(rad) * player.speed;
      const prev = { x: player.x, y: player.y };
      player.x = nx; player.y = ny;
      if (wallCollide(player) || player.x < player.w/2 || player.x > W - player.w/2 ||
          player.y < player.h/2 || player.y > H - player.h/2) {
        player.x = prev.x; player.y = prev.y;
      }
    }

    player.cooldown = Math.max(0, player.cooldown - 1);
    if (FIRE) shoot(player);
  }

  // Spawn enemies
  const maxEnemies = 3 + level;
  enemySpawnTimer++;
  if (enemies.length < maxEnemies && enemySpawnTimer > 120) {
    enemySpawnTimer = 0;
    const spawnPoints = [
      { x: TILE * 1.5, y: TILE * 1.5 },
      { x: W - TILE * 1.5, y: TILE * 1.5 },
      { x: W / 2, y: TILE * 1.5 },
    ];
    const sp = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
    enemies.push(makeTank(sp.x, sp.y, pickEnemyColor(), 'enemy'));
  }

  // Update enemies
  for (const e of enemies) updateEnemy(e, dt);

  // Move bullets
  for (const b of bullets) { b.x += b.vx; b.y += b.vy; }

  // Bullet-wall collisions
  bullets = bullets.filter(b => {
    for (let i = walls.length - 1; i >= 0; i--) {
      const w = walls[i];
      if (rectsOverlap(b, { x: w.x + w.w / 2, y: w.y + w.h / 2, w: w.w, h: w.h })) {
        return false; // destroy bullet (walls are indestructible for simplicity)
      }
    }
    return b.x > 0 && b.x < W && b.y > 0 && b.y < H;
  });

  // Bullet-tank collisions
  const nextBullets = [];
  for (const b of bullets) {
    let hit = false;
    if (b.owner === 'enemy' && player) {
      if (rectsOverlap(b, player)) {
        hit = true;
        lives--;
        updateHUD();
        if (lives <= 0) { gameOver(); return; }
        player.x = W / 2; player.y = H - 80; // respawn
      }
    }
    if (b.owner === 'player') {
      for (let i = enemies.length - 1; i >= 0; i--) {
        if (rectsOverlap(b, enemies[i])) {
          hit = true;
          enemies.splice(i, 1);
          score += 100;
          updateHUD();
          if (score >= level * 500) nextLevel();
          break;
        }
      }
    }
    if (!hit) nextBullets.push(b);
  }
  bullets = nextBullets;
}

function pickEnemyColor() {
  return ['#e74c3c', '#e67e22', '#9b59b6', '#1abc9c'][Math.floor(Math.random() * 4)];
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);

  // Walls
  for (const w of walls) {
    ctx.fillStyle = '#556';
    ctx.fillRect(w.x, w.y, w.w, w.h);
    ctx.strokeStyle = '#334';
    ctx.lineWidth = 1;
    ctx.strokeRect(w.x + 1, w.y + 1, w.w - 2, w.h - 2);
    // brick pattern
    ctx.strokeStyle = '#445';
    ctx.beginPath();
    ctx.moveTo(w.x + w.w / 2, w.y); ctx.lineTo(w.x + w.w / 2, w.y + w.h / 2);
    ctx.moveTo(w.x, w.y + w.h / 2); ctx.lineTo(w.x + w.w, w.y + w.h / 2);
    ctx.moveTo(w.x + w.w / 4, w.y + w.h / 2); ctx.lineTo(w.x + w.w / 4, w.y + w.h);
    ctx.moveTo(w.x + 3 * w.w / 4, w.y + w.h / 2); ctx.lineTo(w.x + 3 * w.w / 4, w.y + w.h);
    ctx.stroke();
  }

  // Bullets
  for (const b of bullets) {
    ctx.fillStyle = b.owner === 'player' ? '#ffe066' : '#ff6666';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Enemies
  for (const e of enemies) drawTank(e);

  // Player
  if (player) drawTank(player);
}

function drawTank(t) {
  ctx.save();
  ctx.translate(t.x, t.y);
  ctx.rotate((t.dir) * Math.PI / 180);

  const hw = t.w / 2, hh = t.h / 2;

  // Body
  ctx.fillStyle = t.color;
  ctx.fillRect(-hw, -hh, t.w, t.h);

  // Tracks
  ctx.fillStyle = t.type === 'player' ? '#2e7d32' : '#7f2020';
  ctx.fillRect(-hw - 4, -hh, 4, t.h);
  ctx.fillRect(hw, -hh, 4, t.h);

  // Track segments
  ctx.fillStyle = '#0005';
  for (let i = 0; i < 4; i++) {
    ctx.fillRect(-hw - 4, -hh + i * (t.h / 4), 4, 2);
    ctx.fillRect(hw, -hh + i * (t.h / 4), 4, 2);
  }

  // Turret base
  ctx.fillStyle = t.type === 'player' ? '#388e3c' : '#c62828';
  ctx.beginPath();
  ctx.arc(0, 0, hw * 0.6, 0, Math.PI * 2);
  ctx.fill();

  // Barrel
  ctx.fillStyle = '#222';
  ctx.fillRect(-3, -hh - 10, 6, hh + 10);

  // Star on player
  if (t.type === 'player') {
    ctx.fillStyle = '#ffe066';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('★', 0, 2);
  }

  ctx.restore();
}

// ── Game state ─────────────────────────────────────────────────────────────
function nextLevel() {
  level++;
  initLevel();
  updateHUD();
}

function gameOver() {
  state = 'over';
  const ol = document.getElementById('overlay');
  ol.style.display = 'flex';
  document.getElementById('ol-title').textContent = '游戏结束';
  document.getElementById('ol-msg').textContent = `最终得分: ${score}`;
  document.getElementById('ol-btn').textContent = '重新开始';
}

function updateHUD() {
  document.getElementById('lives').textContent = lives;
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
}

// ── Input ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
    e.preventDefault();
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Initial render
render();
</script>
</body>
</html>
